<div class="card-header separator" style="justify-content: center">
  <h4 class="card-title d-flex">
    <i class="btn btn-ai btn-sm btn-ai-hint ai-icon m-r-8" style="margin-top:4px;"><span></span></i>
    <span class="m-t-8">Generate substitutions with agent:</span>
    <span class="label label-success m-l-8 m-t-8 m-b-8 text-16">{{aiAgent.name}}</span>
  </h4>
</div>

<div class="card-inner-scroll fit-h">
  @if (aiAgent) {
  <c8y-ai-chat [isLoading]="isLoadingChat" [disabled]="false" [prompt]="chatInput"
    (onMessage)="handleMessage($event)" [config]="chatConfig">
    @for (message of getCompatibleMessages(); track $index) {
    <c8y-ai-chat-message [message]="formatMessage(message)">
    </c8y-ai-chat-message>
    }
  </c8y-ai-chat>
  }
</div>

<div class="card-footer separator text-center flex-no-shrink">
  <div class="form-group">
    <button type="button" name="update" class="btn btn-primary" (click)="save()" [disabled]="!valid" translate>
      Save
    </button>
    <button type="button" name="update" class="btn btn-primary" (click)="cancel()" translate>
      Cancel
    </button>
  </div>
</div>
